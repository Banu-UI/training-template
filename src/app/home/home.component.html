<div class="text-center mt-5">
  <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#flightModal">
    Open Flight Search
  </button>
</div>
<!-- MODAL -->
<div class="modal fade" id="flightModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">Search Flights</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <div class="row g-3">

          <div class="col-md-6">
            <input type="text" class="form-control" placeholder="From">
          </div>

          <div class="col-md-6">
            <input type="text" class="form-control" placeholder="To">
          </div>

          <div class="col-md-6">
            <input type="date" class="form-control">
          </div>

          <div class="col-md-6">
            <input type="date" class="form-control">
          </div>

          <div class="col-md-6">
            <select class="form-select">
              <option>1 Adult</option>
              <option>2 Adults</option>
            </select>
          </div>

        </div>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
       <button class="btn btn-primary" (click)="goToSearch()">
  Search
</button>
      </div>

    </div>
  </div>
</div>

<p>Newly Added</p>
